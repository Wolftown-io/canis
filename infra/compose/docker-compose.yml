# Kaiku Production Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and configure
#   2. docker compose up -d                             (core services)
#      docker compose --profile monitoring up -d        (with monitoring)
#
# Required environment variables (see .env.example):
#   - DOMAIN: Your domain (e.g., chat.example.com)
#   - POSTGRES_PASSWORD: Strong database password
#   - JWT_SECRET: Strong secret for JWT signing
#   - ACME_EMAIL: Email for Let's Encrypt certificates

services:
  # ==========================================================================
  # Kaiku Server
  # ==========================================================================
  server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    image: voicechat/server:latest
    container_name: canis-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      - BIND_ADDRESS=0.0.0.0:8080
      - DATABASE_URL=postgres://voicechat:${POSTGRES_PASSWORD}@postgres:5432/voicechat
      - REDIS_URL=redis://valkey:6379
      - JWT_SECRET=${JWT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-voicechat}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - STUN_SERVER=${STUN_SERVER:-stun:stun.l.google.com:19302}
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY:-}
      # Rate limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_TRUST_PROXY=${RATE_LIMIT_TRUST_PROXY:-true}
      - RATE_LIMIT_ALLOWLIST=${RATE_LIMIT_ALLOWLIST:-}
      # Observability (enable with --profile monitoring)
      - OBSERVABILITY_ENABLED=${OBSERVABILITY_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=vc-server
      - OTEL_TRACES_SAMPLER_ARG=${OTEL_TRACES_SAMPLER_ARG:-1.0}
      - RUST_LOG=${RUST_LOG:-vc_server=info}
    ports:
      # WebRTC UDP ports for voice
      - "${RTP_PORT_MIN:-10000}-${RTP_PORT_MAX:-10100}:${RTP_PORT_MIN:-10000}-${RTP_PORT_MAX:-10100}/udp"
    networks:
      - voicechat
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.voicechat.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.voicechat.entrypoints=websecure"
      - "traefik.http.routers.voicechat.tls.certresolver=letsencrypt"
      - "traefik.http.services.voicechat.loadbalancer.server.port=8080"
      # WebSocket support
      - "traefik.http.middlewares.voicechat-ws.headers.customrequestheaders.Connection=Upgrade"

  # ==========================================================================
  # PostgreSQL Database (Bitnami hardened image)
  # ==========================================================================
  postgres:
    image: bitnami/postgresql:latest
    container_name: canis-postgres
    restart: unless-stopped
    environment:
      - POSTGRESQL_USERNAME=voicechat
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=voicechat
    volumes:
      - postgres_data:/bitnami/postgresql
    networks:
      - voicechat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicechat -d voicechat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Valkey (Redis-compatible, BSD-3-Clause licensed)
  # ==========================================================================
  valkey:
    image: bitnami/valkey:latest
    container_name: canis-valkey
    restart: unless-stopped
    environment:
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-}
      - ALLOW_EMPTY_PASSWORD=${ALLOW_EMPTY_PASSWORD:-no}
    volumes:
      - valkey_data:/bitnami/valkey/data
    networks:
      - voicechat
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Traefik Reverse Proxy
  # ==========================================================================
  traefik:
    image: traefik:v3.0
    container_name: canis-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - voicechat

  # ==========================================================================
  # OTel Collector (monitoring profile — opt-in)
  # Start with: docker compose --profile monitoring up -d
  # ==========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    container_name: canis-otel-collector
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ../monitoring/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC (localhost only)
      - "127.0.0.1:4318:4318"   # OTLP HTTP (localhost only)
      - "127.0.0.1:8889:8889"   # Prometheus scrape endpoint
    networks:
      - voicechat

  # ==========================================================================
  # Prometheus (monitoring profile)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: canis-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - ../monitoring/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ../monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - voicechat

  # ==========================================================================
  # Grafana Tempo — Trace Storage (monitoring profile)
  # ==========================================================================
  tempo:
    image: grafana/tempo:2.4.0
    container_name: canis-tempo
    restart: unless-stopped
    profiles: ["monitoring"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../monitoring/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
    networks:
      - voicechat

  # ==========================================================================
  # Grafana Loki — Log Aggregation (monitoring profile)
  # ==========================================================================
  loki:
    image: grafana/loki:2.9.0
    container_name: canis-loki
    restart: unless-stopped
    profiles: ["monitoring"]
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ../monitoring/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - voicechat

  # ==========================================================================
  # Grafana — Dashboards (monitoring profile)
  # Access via Netbird VPN at http://localhost:3000
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: canis-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - voicechat
    depends_on:
      - prometheus
      - tempo
      - loki

networks:
  voicechat:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  letsencrypt:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:
